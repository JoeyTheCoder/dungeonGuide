name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync dungeon data from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DUNGEONS_DATABASE_ID: ${{ secrets.NOTION_DUNGEONS_DATABASE_ID }}
        run: npm run sync:notion

      - name: Build app
        run: npm run build

      - name: Prepare runtime artifact
        run: |
          set -eu
          mkdir -p deploy-package/server
          cp -R dist deploy-package/dist
          cp package.json deploy-package/package.json
          cp package-lock.json deploy-package/package-lock.json
          cp .env.example deploy-package/.env.example
          cp server/app.mjs deploy-package/server/app.mjs
          cp server/notion-config.mjs deploy-package/server/notion-config.mjs
          cp server/notion-fetch.mjs deploy-package/server/notion-fetch.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy-package
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Validate deployment configuration
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -eu
          missing=""

          [ -n "$SSH_HOST" ] || missing="$missing SSH_HOST"
          [ -n "$SSH_USER" ] || missing="$missing SSH_USER"
          [ -n "$SSH_PRIVATE_KEY" ] || missing="$missing SSH_PRIVATE_KEY"
          [ -n "$SSH_PORT" ] || missing="$missing SSH_PORT"
          [ -n "$DEPLOY_PATH" ] || missing="$missing DEPLOY_PATH"

          if [ -n "$missing" ]; then
            echo "Missing required deploy secrets:$missing"
            exit 1
          fi

          case "$DEPLOY_PATH" in
            /|"" )
              echo "DEPLOY_PATH must not be empty or /."
              exit 1
              ;;
            /* )
              ;;
            * )
              echo "DEPLOY_PATH must be an absolute path."
              exit 1
              ;;
          esac

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: deploy-package

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            TMP_DEPLOY_PATH="/tmp/dungeonGuide-${{ github.run_id }}-${{ github.run_attempt }}"

            if [ -z "$DEPLOY_PATH" ] || [ "$DEPLOY_PATH" = "/" ]; then
              echo "Refusing to deploy to an unsafe path."
              exit 1
            fi

            rm -rf "$TMP_DEPLOY_PATH"
            mkdir -p "$TMP_DEPLOY_PATH"

      - name: Copy site to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: deploy-package/*
          target: /tmp/dungeonGuide-${{ github.run_id }}-${{ github.run_attempt }}
          strip_components: 1

      - name: Publish app and install runtime dependencies
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            SYSTEMD_SERVICE_NAME="${{ secrets.SYSTEMD_SERVICE_NAME }}"
            TMP_DEPLOY_PATH="/tmp/dungeonGuide-${{ github.run_id }}-${{ github.run_attempt }}"

            sudo mkdir -p "$DEPLOY_PATH"
            sudo find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
            sudo cp -a "$TMP_DEPLOY_PATH"/. "$DEPLOY_PATH"/
            cd "$DEPLOY_PATH"
            npm ci --omit=dev

            if [ -n "$SYSTEMD_SERVICE_NAME" ]; then
              sudo systemctl restart "$SYSTEMD_SERVICE_NAME"
            fi

            rm -rf "$TMP_DEPLOY_PATH"
